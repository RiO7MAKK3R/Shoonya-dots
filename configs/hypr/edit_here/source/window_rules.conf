# Floating installer terminals
# windowrulev2 = float, class:^(install-.*)$
# windowrulev2 = size 60% 60%, class:^(install-.*)$
# windowrulev2 = center, class:^(install-.*)$
# Floating remove terminals
# windowrulev2 = float, class:^(remove-.*)$
# windowrulev2 = size 60% 60%, class:^(remove-.*)$
# windowrulev2 = center, class:^(remove-.*)$
