animations {
    enabled = true

    # --------------------------------------------------------
    # Apple-like Bezier Curves
    # --------------------------------------------------------

    # Main curve — smooth acceleration then soft landing
    bezier = mac, 0.25, 0.9, 0.3, 1.0

    # Slight spring feel for pop-in
    bezier = macSpring, 0.2, 0.85, 0.25, 1.05

    # Faster UI interactions
    bezier = macFast, 0.3, 0.8, 0.25, 1.0


    # --------------------------------------------------------
    # Windows (Smooth scale + fade like macOS)
    # --------------------------------------------------------

    animation = windows, 1, 4, macSpring, popin 88%
    animation = windowsOut, 1, 3, macFast, popin 88%
    animation = windowsMove, 1, 4, mac


    # --------------------------------------------------------
    # Borders & Fade (subtle)
    # --------------------------------------------------------

    animation = border, 1, 2, macFast
    animation = fade, 1, 2, macFast


    # --------------------------------------------------------
    # UI Layers (Rofi, SwayNC, menus)
    # Slightly faster like macOS sheets
    # --------------------------------------------------------

    animation = layers, 1, 3, macFast, slide
    animation = layersOut, 1, 2, macFast


    # --------------------------------------------------------
    # Workspaces (Mission Control-like slide)
    # --------------------------------------------------------

    animation = workspaces, 1, 5, mac, slidevert


    # --------------------------------------------------------
    # Scratchpad / Special Workspace
    # --------------------------------------------------------

    animation = specialWorkspace, 1, 4, mac, slide
}
